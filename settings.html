<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Random Generator</title>
    <meta name="description" content="A simple webapp for when you need a random...">
    <meta name="author" content="Michael Wong">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/settings.css">
    <script type="module" defer src="scripts/settings.js"></script>
</head>

<body>
    <header>
        <h1 class="title">Ipsum Lorem</h1>
    </header>
    <main>
        <section class="menu">
            <div class="menu__title-area">
                <div class="menu__title-container menu__container">
                    <h2 class="menu__title-text">Settings</h2>
                </div>
                <a href="/" class="menu__title-link">↱</a>
            </div>
            <nav class="menu__tab-area">
                <input type="radio" name="tab" id="radio-number" class="menu__tab-radio" value="number">
                <label for="radio-number" class="menu__tab-label">Numbers</label>
                <input type="radio" name="tab" id="radio-food" class="menu__tab-radio" value="food">
                <label for="radio-food" class="menu__tab-label">Food</label>
            </nav>
            <form id="number" class="menu__content">
                <div class="menu__options">
                    <div class="menu__item-container"><label for="numberMin">From: </label>
                        <input type="number" class="number__input" id="numberMin" value="1">
                    </div>
                    <div class="menu__item-container"><label for="numberMax">To: </label>
                        <input type="number" class="number__input" id="numberMax" value="10">
                    </div>
                    <div class="menu__item-container">
                        <label for="numberInc">Exclusive</label>
                        <input type="range" class="number__input" id="numberInc" min="0" max="1" value="1">
                        <span>Inclusive</span>
                    </div>
                    <div class="menu__item-container"><span>History: </span><span id="numberHistory" class="menu__history"></span></div>
                    <div class="menu__item-container"><span>Counter: </span><span id="numberCounter"></span></div>
                </div>
                <hr class="menu__divider">
                <button class="menu__save-button">Save</button>
            </form>
            <form id="food" class="menu__content">
                <div class="menu__options--grid">
                </div>
                <div class="menu__item-container">
                    <span>History: </span><span id="foodHistory" class="menu__history"></span>
                </div>
                <div class="menu__item-container">
                    <span>Counter: </span><span id="foodCounter"></span>
                </div>
                <hr class="menu__item__divider">
            </form>
        </section>
    </main>
    <footer>
        <p>a practice project by Michael Wong</p>
    </footer>
</body>
