<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Random Generator</title>
    <meta name="description" content="A simple webapp for when you need a random...">
    <meta name="author" content="Michael Wong">
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>
    <header>
        <h1 class="title">Random Generator</h1>
        <menu class="menu-icon">⚙️</menu>
    </header>
    <main>
        <button class="random">?</button>
        <section class="range">
            <input type="number" class="range__min" value="1">
            <input type="number" class="range__max" value="10">
        </section>
    </main>
    <footer>
        <p>a practice project by Michael Wong</p>
    </footer>
</body>

</html>
